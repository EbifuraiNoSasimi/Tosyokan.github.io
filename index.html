<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #ffffff;
            color: #000000;
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            font-size: 1.3rem;
            margin: 5px 0;
            text-align: center;
        }

        /* 検索トグルボタン */
        .search-toggle-btn {
            background-color: #000000;
            color: #ffffff;
            border: none;
            padding: 12px 24px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            margin-bottom: 15px;
            width: 100%;
            max-width: 650px;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        /* 普段は折りたたまれている検索パネル */
        .search-panel {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-out;
            width: 100%;
            max-width: 650px;
            background-color: #f9f9f9;
            border-radius: 4px;
            margin-bottom: 15px;
        }

        .search-panel.open {
            max-height: 400px; /* メニューの高さに合わせて自動調整（スクロール可能） */
            overflow-y: auto;
            border: 1px solid #dddddd;
        }

        /* ジャンルグループのスタイル */
        .genre-group {
            padding: 10px;
        }
        .genre-title {
            font-size: 0.85rem;
            font-weight: bold;
            border-left: 3px solid #000000;
            padding-left: 6px;
            margin: 10px 0 5px 0;
            color: #333333;
        }

        /* ボタンのグリッド配置 */
        .button-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(135px, 1fr));
            gap: 6px;
            padding: 5px 0;
        }

        .nav-button {
            background-color: #ffffff;
            color: #000000;
            border: 1px solid #cccccc;
            padding: 8px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8rem;
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            transition: all 0.2s ease;
        }

        .nav-button:hover {
            background-color: #f0f0f0;
            border-color: #000000;
        }

        .nav-button.active {
            background-color: #000000;
            color: #ffffff;
            border-color: #000000;
        }

        /* マップのコンテナ */
        .map-container {
            background-color: #ffffff;
            border: 2px solid #000000;
            padding: 10px;
            max-width: 100%;
            width: 650px;
            box-sizing: border-box;
        }

        svg {
            width: 100%;
            height: auto;
            display: block;
        }

        /* モノトーンのデザイン設定 */
        .border-main { fill: none; stroke: #000000; stroke-width: 3; }
        .border-sub { fill: none; stroke: #000000; stroke-width: 1.5; }
        .room-bg { fill: #f5f5f5; stroke: #000000; stroke-width: 1.5; }
        .shelf-bg { fill: #e0e0e0; stroke: #000000; stroke-width: 1; }
        .booth-bg { fill: #ffffff; stroke: #000000; stroke-width: 1; }
        
        /* 現在地ピン */
        .current-pos { fill: #000000; stroke: #ffffff; stroke-width: 2; }
        
        /* テキストスタイル */
        .txt { fill: #000000; font-size: 10px; font-family: sans-serif; text-anchor: middle; }
        .txt-sm { fill: #000000; font-size: 8px; font-family: sans-serif; text-anchor: middle; }
        .txt-bold { fill: #000000; font-size: 11px; font-family: sans-serif; text-anchor: middle; font-weight: bold; }

        /* ルート（光る線）の白黒表現（黒太線が点滅・伸長する） */
        .guide-path {
            fill: none;
            stroke: #000000;
            stroke-width: 5;
            stroke-linecap: round;
            stroke-linejoin: round;
            opacity: 0;
            stroke-dasharray: 1500;
            stroke-dashoffset: 1500;
            transition: opacity 0.2s ease;
        }

        /* アクティブ時のアニメーション */
        .guide-path.active {
            opacity: 1;
            animation: drawPath 1.5s ease-out forwards, pulseGlow 1s infinite alternate;
        }

        @keyframes drawPath {
            to { stroke-dashoffset: 0; }
        }

        @keyframes pulseGlow {
            from {
                stroke-width: 4;
                filter: drop-shadow(0 0 1px #ffffff) drop-shadow(0 0 2px #000000);
            }
            to {
                stroke-width: 6;
                filter: drop-shadow(0 0 2px #ffffff) drop-shadow(0 0 5px #000000);
            }
        }
    </style>
</head>

    <script>
        // 検索パネルの開け閉めを制御する関数
        function toggleSearchPanel() {
            const panel = document.getElementById('search-panel');
            const icon = document.getElementById('toggle-icon');
            const text = document.getElementById('toggle-text');
            
            panel.classList.toggle('open');
            
            if (panel.classList.contains('open')) {
                icon.textContent = '❌';
                text.textContent = '検索メニューを閉じる';
            } else {
                icon.textContent = '🔍';
                text.textContent = '探したい本のジャンルを選択する';
            }
        }

        // ルートを選択して表示する関数
        function selectRoute(targetId) {
            // すべてのルートをリセット
            document.querySelectorAll('.guide-path').forEach(path => {
                path.classList.remove('active');
                path.style.animation = 'none';
                path.offsetHeight; 
                path.style.animation = null;
            });

            // ボタンのアクティブ色をリセット
            document.querySelectorAll('.nav-button').forEach(btn => {
                btn.classList.remove('active');
            });

            // ターゲットのルートを光らせる
            const targetPath = document.getElementById(`route-${targetId}`);
            if (targetPath) {
                targetPath.classList.add('active');
            }

            // クリックされたボタンを黒く反転
            event.currentTarget.classList.add('active');

            // ルートが見えやすいように、ボタンを押したら自動でメニューを閉じる
            setTimeout(() => {
                toggleSearchPanel();
            }, 300); 
        }
    </script>
