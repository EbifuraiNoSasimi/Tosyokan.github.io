<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>図書館マップ</title>
<style>
    body {
        font-family: sans-serif;
        margin: 0;
        padding: 20px;
        background-color: #f5f5f5;
    }

    /* マップとメニューの親コンテナ */
    .library-container {
        position: relative;
        width: 100%;
        max-width: 1000px;
        margin: 0 auto;
        background: #fff;
        border: 1px solid #ccc;
    }

    /* マップ画像 */
    .map-image {
        width: 100%;
        height: auto;
        display: block;
    }

    /* ハイライトされる本棚（初期状態は透明） */
    .shelf-highlight {
        position: absolute;
        background-color: rgba(255, 255, 0, 0.5); /* 黄色の半透明 */
        border: 3px solid red;
        border-radius: 4px;
        opacity: 0; 
        transition: opacity 0.3s ease-in-out;
        pointer-events: none; /* ハイライトがクリックの邪魔にならないようにする */
    }

    /* アクティブ時のハイライト */
    .shelf-highlight.active {
        opacity: 1;
        box-shadow: 0 0 15px rgba(255, 0, 0, 0.7);
    }

    /* 右上のタブ・メニュー */
    .search-menu {
        position: absolute;
        top: 10px;
        right: 10px;
        width: 250px;
        background: rgba(255, 255, 255, 0.95);
        border: 1px solid #333;
        border-radius: 5px;
        box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        padding: 10px;
        z-index: 10;
    }

    /* アコーディオンメニューの装飾 */
    details {
        margin-bottom: 5px;
    }
    summary {
        cursor: pointer;
        padding: 5px;
        font-weight: bold;
        background-color: #e9e9e9;
        border-radius: 3px;
    }
    summary:hover {
        background-color: #dcdcdc;
    }
    details details summary {
        font-weight: normal;
        background-color: transparent;
        border-bottom: 1px solid #eee;
    }
    
    /* 小分類のリスト */
    ul.sub-category {
        list-style: none;
        padding-left: 15px;
        margin: 5px 0;
    }
    ul.sub-category li {
        padding: 5px;
        cursor: pointer;
        color: #0056b3;
        font-size: 0.9em;
    }
    ul.sub-category li:hover {
        text-decoration: underline;
        background-color: #f0f8ff;
    }
</style>
</head>
<body>

<div class="library-container">
    <img src="library-map.png" alt="図書館概要閲覧室" class="map-image">

    <div id="shelf-nihon-bungaku" class="shelf-highlight" style="top: 12%; left: 70%; width: 15%; height: 5%;"></div>
    
    <div id="shelf-gaikoku-bungaku" class="shelf-highlight" style="top: 12%; left: 35%; width: 15%; height: 5%;"></div>
    
    <div id="shelf-sugaku" class="shelf-highlight" style="top: 28%; left: 35%; width: 15%; height: 5%;"></div>

    <div class="search-menu">
        <details>
            <summary>📂 分類から探す (大分類)</summary>
            
            <details>
                <summary>9類 文学</summary>
                <ul class="sub-category">
                    <li onclick="highlightShelf('shelf-nihon-bungaku')">9類 日本文学</li>
                    <li onclick="highlightShelf('shelf-gaikoku-bungaku')">9類 外国文学</li>
                </ul>
            </details>

            <details>
                <summary>4類 自然科学・数学</summary>
                <ul class="sub-category">
                    <li onclick="highlightShelf('shelf-sugaku')">4類 数学</li>
                </ul>
            </details>

        </details>
    </div>
</div>

<script>
    // 指定したIDの本棚を光らせる関数
    function highlightShelf(targetId) {
        // 1. まず、現在光っているすべてのハイライトを消す
        const allHighlights = document.querySelectorAll('.shelf-highlight');
        allHighlights.forEach(function(el) {
            el.classList.remove('active');
        });

        // 2. クリックされた分類に対応する本棚を光らせる
        const targetElement = document.getElementById(targetId);
        if (targetElement) {
            targetElement.classList.add('active');
            
            // (オプション) 3秒後に自動でハイライトを消す場合は以下のコメントアウトを外す
            // setTimeout(() => {
            //     targetElement.classList.remove('active');
            // }, 3000);
        }
    }
</script>

</body>
</html>
